<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
        <link rel="stylesheet" href="style.css">
        <style>
            ul{
                list-style: none;
                margin: 20px;
                font-size: large;
                font-weight: bold;
            }
        </style>
    </head>
    
    
    <body>
        
     
    <h1>Advanced Javascript</h1>
    
    <div class="container">
    
        <div class="form">
         <h2>Pattern Printing</h2>
        <input type="number" style="margin-bottom: 10px;" placeholder="Enter the number rows" id="num-rows" >
          <ul class="star" style="list-style-type: none; text-align:left;">
            
          </ul>
        </div>
        
        
        
        <div class="form">
          <h2>Template Literals</h2>
          <div id="bio-form">
          <label for="name" >Name</label>
          <input type="text" id="name" placeholder="Enter your name to add it in your bio">
          <label for="role">Role</label>
          <input type="text" id="role" placeholder="Enter your name to add it in your bio">
          <button onclick="gen_bio()">Generate bio</button>
          </div>
            
           <div id="user-bio">
           <pre id="bio-output" style="font-size: large; font-weight:bold; color:greenyellow;display: none">
           </pre>  
          </div>
          
        </div>
        
    </div>
    <h1>Destruction</h1>
    <div class="container">
      <div class="form">
        <h2>List Destruction</h2>
       <div class="list-form">
        <label for="apple">Apple</label>
        <input type="checkbox" name="fruits" id="apple" value="Apple">
        <label for="orange">Orange</label>
        <input type="checkbox" name="fruits" id="orange" value="Orange">
        <label for="grapes">Grapes</label>
        <input type="checkbox" name="fruits" id="grapes" value="Grapes">
        <label for="banana">Banana</label>
        <input type="checkbox" name="fruits" id="banana" value="Banana">
        <button onclick="get_list()">Get List</button>
       </div>
          
          
        <div id="fruit-list">
           <pre id="fruit-output" style="font-size: large; font-weight:bold; color:greenyellow;display:none;">
           </pre>  
        </div>
          
      </div> 
      <div class = "form">
          <h2>Object Destruction</h2>
          
          <ul id="users">
          </ul>
          
         <h3>Sending email Example</h3>
          <ul id = "users-mail-sending">
            
          </ul>
          
          <h3>Users Age example</h3>
          
          <ul id = "users-age">
            
          </ul>
          
      </div>
    </div>
      
    <div class = "container">
    
      <div class="pri">
        <form onsubmit="validate()">
         <input type="text" id="form-name" placeholder="Enter your name" required>
          <span id="error">
            
          </span>
          <br>
          <br>
          <input type="submit" value="Validate">
        </form>
      </div>
      
    </div>
    
    <script type="module" src="script.js"></script>
    </body>
</html>
