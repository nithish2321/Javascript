<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            color: white;
            text-align: center;
            box-sizing: border-box; /* Prevents padding from breaking layout */
        }

        body {
            background-color: rgb(0,0,0);
            margin: 0;
            padding: 10px;
        }

        h2 {
            color: red;
        }

        h3 {
            color: orange;
        }

        .container, .form-container {
            display: flex;
            flex-direction: row;	
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .pri, .Non-pri, .form, .form-data{
            background-color: rgba(255,255,255,0.4);
            padding: 15px;
            border: 2px solid white;
            /* Use a smaller basis or 100% logic for mobile safety */
            flex: 1 1 300px;
        }

        li {
            text-align: left;	
        }

        label {
            color: greenyellow;
            font-weight: bold;
            font-size: 20px;
            display: block; /* Makes labels stack nicely */
            margin-top: 10px;
        }

        input {
            color: blue;
            border: none;
            padding: 5px;
            width: 90%; /* Keeps inputs from hitting the border */
        }

        input:focus {
            border: 2px solid greenyellow;	
            outline: none;
            font-weight: bold;
        }

        input[type="file"]::file-selector-button, button {
            margin: 10px;
            background-color: red;
            border: none;
            color: greenyellow;
            font-weight: bold;
            border-radius: 30px;
            padding: 8px 15px;
            cursor: pointer;
        }

        input[type="file"]::file-selector-button:hover, button:hover {
            background-color: greenyellow;
            color: red;
        }
        
        /* Fixed Media Query */
        @media (max-width: 768px) {
            .container, .form-container {
                flex-direction: column;
                align-items: center;
            }

            .pri, .Non-pri, .form, .form-data {
                flex: 1 1 auto;
                width: 100%; /* Forces the box to take full width on mobile */
            }
        }
    </style>
</head>
<body>
    <h1>DataTypes in JavaScript</h1>
     
    <div class="container"> 
        <div class="pri">
            <h2>Primitive Data Types</h2>
            <h3>Numbers</h3>
            <p id="number"></p>
            <h3>String</h3>
            <span id="string"></span>
            <h3>Boolean</h3>
            <span id="boolean"></span>
            <h3>Undefined</h3>
            <span id="und"></span>
            <h3>Null</h3>
            <span id="null"></span>
            <h3>BigInteger[BigInt]</h3>
            <span id="bigInt"></span>
        </div>

        <div class="Non-pri">
            <h2> Non-primitive Data Types </h2>
            <h3>Object</h3>
            <ul id="object"></ul>
            <h3>Arrays</h3>
            <ul id="arrays"></ul>
            <h3>Functions</h3>
            <p id="func"></p>
        </div>
    </div>
    
    <h1>How to Handle Form Data</h1>
       
    <div class="form-container">
       <div class="form">
          <h2>Form</h2> 
          <label for="name">Name</label> 
          <input type="text" id="name" placeholder="Enter your Name">
          <label for="sem-mark">Marks</label> 
          <input type="number" id="sem-mark" placeholder="Enter the sem Marks">
          <label>Upload Files</label>
          <input type="file" id="files" multiple>
          <label for="gender">Gender</label>
          <input type = "radio" id = "male" name="gender" value="Man"> <label for="male" style = "color:white; font-size: 15px;">Male</label>
          <input type="radio" id = "female" name = "gender" value = "Women"> <label for="female" style = "color:white; font-size: 15px;">Female</label>
          <label for="sports">Sports</label>
          <input type="checkbox" name = "sports" value="football" id = "football">  <label for="football" style = "color:white; font-size: 15px;">Football</label>
          <input type="checkbox" name = "sports" value="Criket" id= "Criket">  <label for="Criket" style = "color:white; font-size: 15px;">Criket</label>
          <input type="checkbox" name = "sports" value="Shuttel" id = "Shuttel">  <label for="Shuttel" style = "color:white; font-size: 15px;">Shuttel</label>
          
        </div>
       
       <div class="form-data">
           <h2> Form-Data</h2>
           <button onclick="getData()">Get Data</button>
           <ul id="form-data-list"></ul>
       </div>
    </div>
    
   <style>
       #display{
           width: 100%;
           padding : 15px;
           border-radius: 10px;
           position: relative;
       } 
       .calculator-container{
           width: 400px;
           height: 50px;
           font-size:20px;
           display: flex;
           flex-direction: column;
           position: relative;
       }
       .buttons{
           display: grid;
           grid-template-columns: repeat(5, 1fr);
           gap: 8 px;
           position: relative;
       }
       
       .buttons button{
           cursor: pointer;
       }
       
       .scientific{
           background: lightblue;
           color: rgb(0,0,0);
       }
       
       .number{
           background-color: lightgray;
           color: rgb(0,0,0);
       }
       
       sub,sup{
           color: rgb(0,0,0);
       }
       
       .operator{
           background: orange;
           color: rgb(0,0,0);
       }
       
   </style>
    
    <div class = "container">
    
    <div class = "pri">
        
         <h1>Calculator</h1>
        
        <input type="text" id="display">
        <div class = "buttons">
           <button class = "clear" onclick = "clearD()">C</button>
           <button class = "scientific" onclick = "press('(')">(</button>
           <button class = "scientific" onclick =" press(')')">)</button>
           <button class = "scientific" onclick="sqrt()">sqrt</button>
           <button class = "operator" onclick = "press('/')">/</button>
            
            
           <button class = "number" onclick = "press('7')">7</button>
           <button class = "number" onclick = "press('8')">8</button>
           <button class = "number" onclick = "press('9')">9</button>
           <button class = "scientific" onclick="power()"><sub>X</sub><sup>2</sup></button>
           <button class = "operator" onclick = "press('*')" >*</button>

           <button class = "number" onclick = "press('4')">4</button>
           <button class = "number" onclick = "press('5')">5</button>
           <button class = "number" onclick = "press('6')">6</button>
           <button class = "scientific" onclick="fact()">X!</button>
           <button class = "operator" onclick = "press('-')">-</button>
            
            
           <button class = "number" onclick = "press('3')">3</button>
           <button class = "number" onclick = "press('2')">2</button>
           <button class = "number" onclick = "press('1')">1</button>
           <button class = "scientific" onclick="combination()">nCr</button>
           <button class = "operator" onclick = "press('+')">+</button>
            
           <button class = "number" onclick = "press('0')">0</button>
           <button class = "number" onclick = "press('.')">.</button>
           <button class = "equal" onclick="calculate()">=</button>
           <button class = "scientific" onclick="permutation()">nPr</button>
          <button class = "operator" onclick = "press('%')">%</button>
        </div>
    </div>
        
        <style>
         
            #operation{
                background: white;
                color:blue;
                border: none;
                padding: 8px;
                border-radius: 5px;
                width: 80%;
                font-weight: bold;
                cursor: pointer;
                margin: 10px;
            }
            
            #operation:focus{
                border: 2px solid greenyellow;
                outline: none;
                
            }
            
            
            #operation option{
                background-color: rgb(0,0,0);
                
            }
        
        </style>
        
        <div class = "form">
           <h1>Tables Printer</h1>
           <select name="operation" id="operation">
              <option value=""></option>
              <option value="*">Multiplication</option>
              <option value="/">Division</option>
              <option value="+">Addition</option>
              <option value="-">Subtraction</option>
              <option value="%">Modulo</option>
              <option value="2">Sqaure</option>
              <option value="3">Cube</option>
           </select>
           <input type="number" id = "times" placeholder="Enter a number">
           <br><br>
           <input type="number" id = "bottom" placeholder="Enter the bottom">
           <button onclick="tables()">Get Tables</button>
            
            
            <ul id ="tables-printing-area"></ul>
            
            <script>
                
            function tables(){
            let operator = document.getElementById("operation").value;
            let a = Number(document.getElementById("times").value);
            let b = Number(document.getElementById("bottom").value);
            let print =  document.getElementById("tables-printing-area");
            print.innerHTML = "";
                
            if(operator == "2" || operator == "3"){
                for(let i  = 1 ; i <= b ; i++){
                    if(operator == "2"){
                          print.innerHTML += "<li>"+ i + " ^  2 " + " = " + Math.pow(i,2) +"</li>";
                    }else{
                         print.innerHTML += "<li>"+ i + " ^ 3 = " + Math.pow(i,3) +"</li>";
                    }
                }
            }else{
            
            for(let i = 1; i <= b; i++){
                print.innerHTML += "<li>"+ a + " "+ operator+ " "+ i + " = " + eval(""+a+operator+i)+"</li>";
             }
            
            }
            
            }
            </script>
        </div>
        
    </div>
    
    <script>
    
    function press(val){
        document.getElementById("display").value += val;
    }
        
    function calculate(){
        let exp = document.getElementById("display").value;
        
        try{
            document.getElementById("display").value = eval(exp);
        }catch{
             document.getElementById("display").value = "Error";
        }
    }
        
        
    function clearD(){
        document.getElementById("display").value = "";
    }
        
        
    function sqrt(){
        let val = document.getElementById("display").value;
        document.getElementById("display").value = Math.sqrt(val);
    }
        
   function power(){
        let val = document.getElementById("display").value;
        document.getElementById("display").value = Math.pow(val,2);
    }
    
    function fact(){
        let val = document.getElementById("display").value;
       
        document.getElementById("display").value = factorail(val);
    } 
        
        
     function permutation(){
         let n = parseInt(prompt("Enter the n value"));
         let r = parseInt(prompt("Enter the r: "));
         
        document.getElementById("display").value = factorail(n)/factorail(n-r);
    } 
     
     function combination(){
         let n = parseInt(prompt("Enter the n value"));
         let r = parseInt(prompt("Enter the r: "));
         
        document.getElementById("display").value = factorial(n)/(factorail(r)*factorail(n-r));
    } 
    
    function factorail(val){
        let fact = 1;
        for(let i = val; i >= 1; i--){
           fact *= i;
        }
        return fact;
    }
    </script>
    
    <script>
        let name = "Nithish"; 
        let a = 80.282;
        document.getElementById("number").innerHTML = a;
        document.getElementById("string").innerHTML = name;
        document.getElementById("boolean").innerHTML = false;
        let b;
        document.getElementById("und").innerHTML = b;
        document.getElementById("null").innerHTML = null;
        document.getElementById("bigInt").innerHTML = 172288288288288282891991n;

        let student = {name : name, marks: a, area_of_intrest: "Machine Learning"};
        for(let key in student){
            document.getElementById("object").innerHTML += "<li>"+ key +" : "+student[key]+ "</li>";	  
        }
         
        let data = [1,2,4,5,"Nithish"];
        for(let i in data){
            document.getElementById("arrays").innerHTML += "<li>"+data[i]+"</li>";	  
        }
        
        function greet(namep){	
            document.getElementById("func").innerHTML = "Hello " + namep;	  
        }
        greet(name);
        
        function getData(){
            let list = document.getElementById("form-data-list");
            list.innerHTML = ""; // Clear list before adding new data
            list.innerHTML += "<li>Name: "+ document.getElementById("name").value+"</li>";
            list.innerHTML += "<li>Marks: "+ document.getElementById("sem-mark").value+"</li>";
            let files = document.getElementById("files").files;
            list.innerHTML += "<li>Files uploaded: "+ files.length +"</li>";
            let selected = document.querySelector('input[name = "gender" ]:checked');
            if(selected){
                list.innerHTML += "<li> Succesfully Checked the "+selected.value+"</li>";
            }else{
                list.innerHTML += "<li> Not checked anything </li>";
            }
            
            let selectedSp = document.querySelectorAll('input[name = "sports" ]:checked');
            
            let sports = [];
            
            for(let s of selectedSp){
                sports.push(s.value);
            }
            if(sports.length > 0){
                list.innerHTML += "<li> Succesfully Checked the "+sports.join(", ")+"</li>";
            }else{
                list.innerHTML += "<li> Not checked anything </li>";
            }
        }
    </script>
</body>
</html>
